# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Manual trigger so the real-toolchain validation job (which needs CC5X + CrossOver, only
  # present on a self-hosted runner) can be kicked off on demand without blocking PR CI.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: pyproject.toml
    - name: Install headless Qt runtime libraries
      run: |
        # The runner pre-configures a Microsoft apt repo (azure-cli) that intermittently
        # returns 403 and fails `apt-get update`; it is irrelevant to these Qt libs, which
        # come from the Ubuntu archive. Drop that source, then update tolerantly (retry once,
        # never fail the job on a flaky third-party mirror) -- the install below is the real
        # gate: it still fails the job if the Ubuntu libs genuinely can't be fetched.
        sudo rm -f /etc/apt/sources.list.d/*microsoft* /etc/apt/sources.list.d/*azure* || true
        sudo apt-get update || sudo apt-get update || true
        sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e ".[dev]"
        # GUI extra (PyQt6) is best-effort: wheels may lag on the newest Python.
        # The GUI smoke tests skip automatically when PyQt6 is unavailable.
        python -m pip install -e ".[gui]" || echo "PyQt6 unavailable on this Python; GUI tests will skip"
    - name: Lint with flake8
      run: |
        # Hard gate 1: syntax errors / undefined names / f-string bugs fail the build.
        python -m flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Hard gate 2: every substantive lint finding (unused imports, bad comparisons,
        # etc.) fails the build too — only line-length (E501) stays advisory below.
        # Excludes/line-length come from the checked-in .flake8 config.
        python -m flake8 . --count --extend-ignore=E501 --statistics
        # Advisory: line-length report (does not fail the build).
        python -m flake8 . --count --select=E501 --exit-zero --statistics
    - name: Test with pytest
      env:
        QT_QPA_PLATFORM: offscreen
      run: |
        python -m pytest

  package:
    # Build the wheel + sdist and smoke-test the installed artifact. The matrix job above only
    # installs in editable mode, which never exercises packaging: a missing package (e.g. the
    # cc5x_setcc_native_lib subpackage dropped from the wheel) or a broken console-script entry
    # point would ship green. This job is the gate that the distributable actually works.
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Build sdist and wheel
      run: |
        python -m pip install --upgrade pip build
        python -m build
    - name: Install the built wheel into a clean venv and smoke-test it
      run: |
        python -m venv /tmp/wheeltest
        # Install the wheel (not the source tree) so the test exercises exactly what is shipped.
        /tmp/wheeltest/bin/pip install dist/*.whl
        # Console script resolves and the top-level module imports its subpackage.
        /tmp/wheeltest/bin/cc5x-helper --help > /dev/null
        # The cc5x_setcc_native_lib subpackage must be present in the wheel, not just on the
        # source tree — import it from the installed location to prove it was packaged.
        /tmp/wheeltest/bin/python -c "import cc5x_setcc_native_lib.headergen, cc5x_setcc_native_lib.debuggen, cc5x_setcc_native_lib.packs"
    - name: Validate the sdist contents
      run: |
        python -m pip install twine
        # Fails on a malformed sdist/wheel (bad metadata, missing long-description render).
        python -m twine check dist/*

  cc5x-validation:
    # Real-compiler validation: regenerate device headers with the actual CC5X toolchain and
    # diff against the compiler-shipped headers. CC5X is a paid Windows compiler run under
    # CrossOver, so this can only execute on a self-hosted runner that has the bottle installed.
    # It is therefore manual (workflow_dispatch) and never gates PR CI; on a repo without such a
    # runner the job simply stays unscheduled.
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: [self-hosted, cc5x]
    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v5
    - name: Doctor (toolchain present?)
      run: uv run --frozen cc5x-helper doctor --json
    - name: Validate generated headers against the CC5X-shipped headers
      # The validator lives in the paid CC5X bottle's tooling, outside this repo; point at it via
      # $CC5X_VALIDATE_SCRIPT on the self-hosted runner. Fail loudly if it is not configured
      # rather than silently passing a no-op validation.
      run: |
        if [ -z "${CC5X_VALIDATE_SCRIPT:-}" ] || [ ! -f "${CC5X_VALIDATE_SCRIPT}" ]; then
          echo "::error::CC5X_VALIDATE_SCRIPT is not set to an existing validate_generated_headers.py on this runner"
          exit 1
        fi
        uv run --frozen python "${CC5X_VALIDATE_SCRIPT}"

  extension:
    # Build the VS Code companion extension under strict TypeScript so a broken
    # extension can't merge to main (the Python job alone never compiled it).
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode/cc5x-vscode
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: vscode/cc5x-vscode/package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Compile (strict tsc)
      run: npm run compile
    - name: Package VSIX
      run: npm run package -- --no-dependencies -o cc5x-vscode.vsix

  locked:
    # Install strictly from the committed uv.lock so a drifting transitive dependency cannot
    # silently change what is tested. Additive to the pip matrix above: the matrix proves the
    # package installs from pyproject across Python versions; this proves the pinned set is
    # consistent and tests pass against it.
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
    - name: Install headless Qt runtime libraries
      run: |
        # The runner pre-configures a Microsoft apt repo (azure-cli) that intermittently
        # returns 403 and fails `apt-get update`; it is irrelevant to these Qt libs, which
        # come from the Ubuntu archive. Drop that source, then update tolerantly (retry once,
        # never fail the job on a flaky third-party mirror) -- the install below is the real
        # gate: it still fails the job if the Ubuntu libs genuinely can't be fetched.
        sudo rm -f /etc/apt/sources.list.d/*microsoft* /etc/apt/sources.list.d/*azure* || true
        sudo apt-get update || sudo apt-get update || true
        sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3
    - name: Sync from lockfile (frozen)
      run: |
        # --frozen fails if uv.lock is out of date with pyproject.toml, catching drift.
        uv sync --frozen --extra dev
        # GUI extra is best-effort (PyQt6 wheels may lag on the newest Python).
        uv sync --frozen --extra dev --extra gui || echo "PyQt6 unavailable; GUI tests will skip"
    - name: Test with pytest
      env:
        QT_QPA_PLATFORM: offscreen
      run: uv run --frozen python -m pytest
